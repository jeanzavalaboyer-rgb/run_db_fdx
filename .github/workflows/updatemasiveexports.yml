name: Update Update Exports (Full Update)

on:
  workflow_dispatch:
    inputs:
      sheet_name:
        description: "Google Sheet tab name"
        required: false
        default: "Update Exports"
      spreadsheet_id:
        description: "Google Spreadsheet ID"
        required: false
        default: "165va_Om_aFEmHg7h_zOUKpafsxEdB6MKvAycu6w16yw"

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FEEDONOMICS_API_KEY: ${{ secrets.FEEDONOMICS_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SPREADSHEET_ID: ${{ github.event.inputs.spreadsheet_id }}
      SHEET_NAME: ${{ github.event.inputs.sheet_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ Validación de secrets (evita errores como el que tuviste)
      - name: Validate required secrets
        run: |
          if [ -z "$FEEDONOMICS_API_KEY" ]; then
            echo "❌ Missing FEEDONOMICS_API_KEY"
            exit 1
          fi

          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "❌ Missing GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      # 🔍 Debug opcional (puedes borrar después)
      - name: Debug env
        run: |
          echo "Sheet: $SHEET_NAME"
          echo "Spreadsheet: $SPREADSHEET_ID"
          echo "API KEY LENGTH: ${#FEEDONOMICS_API_KEY}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 google-auth google-api-python-client

      - name: Run script
        run: python updatemasiveexports.py
