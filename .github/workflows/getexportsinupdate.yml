name: Get exports in update

on:
  workflow_dispatch:
    inputs:
      sheet_name:
        description: "Google Sheet tab name"
        required: false
        default: "Update Transformers"
      spreadsheet_id:
        description: "Google Spreadsheet ID"
        required: false
        default: "165va_Om_aFEmHg7h_zOUKpafsxEdB6MKvAycu6w16yw"

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FEEDONOMICS_API_KEY: ${{ secrets.FEEDONOMICS_API_KEY }}
      FEEDONOMICS_SERVICE_PATH: ${{ secrets.FEEDONOMICS_SERVICE_PATH }}
      SPREADSHEET_ID: ${{ github.event.inputs.spreadsheet_id }}
      SHEET_NAME: ${{ github.event.inputs.sheet_name }}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-credentials.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Google credentials file
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/google-credentials.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 pandas google-auth google-api-python-client

      - name: Run script
        run: python getexportsinupdate.py
