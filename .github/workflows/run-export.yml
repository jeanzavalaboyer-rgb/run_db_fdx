name: Export Feedonomics to Excel

on:
  workflow_dispatch:
    inputs:
      account_id:
        description: "Feedonomics account ID"
        required: true
        default: "1717"
      output_name:
        description: "Excel output filename"
        required: true
        default: "global_databases.xlsx"

jobs:
  export-excel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run export script
        env:
          FEEDONOMICS_API_KEY: ${{ secrets.FEEDONOMICS_API_KEY }}
          ACCOUNT_ID: ${{ inputs.account_id }}
          OUTPUT_NAME: ${{ inputs.output_name }}
        run: python main.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: feedonomics-excel
          path: ${{ inputs.output_name }}
